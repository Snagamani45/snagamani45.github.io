<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seed of Might Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://vjs.zencdn.net" rel="stylesheet" />
    <style>
        body { 
          background-image:url('https://wallpapers.com/images/hd/shenronand-goku-sky-adventure-td3wsgcpsm09tgb0.jpg');
          background-position-x:center;
          color: #e2e8f0;
        }
        .glass { background: rgba(23, 23, 23, 0.8); backdrop-filter: blur(12px); border: 1px solid #262626; }
        .video-container { aspect-ratio: 16 / 9; background: #000; border-radius: 12px; overflow: hidden; }
    </style>
</head>
<body class="p-4 md:p-8">
  <div class="max-w-6xl mx-auto">
      <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
          <div>
              <h1 class="text-3xl font-black text-orange-500 tracking-tighter">Color Corrected Dragon Ball</h1>
              <p class="text-gray-500 text-sm">COLOR CORRECTION BY SEED OF MIGHT</p>
          </div>
          
          <div class="relative w-full md:w-64">
              <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"></i>
              <input 
                  type="text" 
                  id="search-input"
                  placeholder="Search episodes..." 
                  oninput="handleSearch(this.value)"
                  class="w-full bg-green-900 border border-gray-800 rounded-full py-2 pl-10 pr-4 text-sm focus:outline-none focus:border-orange-500 transition"
              >
          </div>
      </header>

      <main class="grid grid-cols-1 lg:grid-cols-3 gap-8">
          <div class="lg:col-span-2">
              <div class="video-container mb-4 shadow-2xl">
                  <video id="main-video" controls class="w-full h-full">
                      <source id="video-source" src="" type="video/mp4">
                  </video>
              </div>
              <div class="flex justify-between items-center bg-gray-900 p-4 rounded-xl">
                  <div>
                      <h2 id="display-title" class="text-xl font-bold">Select an Episode</h2>
                      <p id="display-meta" class="text-gray-500 text-sm">Waiting for selection...</p>
                  </div>
                  <div class="flex gap-2">
                      <button onclick="switchLang('en')" id="btn-en" class="px-4 py-2 rounded bg-orange-600 font-bold text-xs uppercase">EN</button>
                      <button onclick="switchLang('jp')" id="btn-jp" class="px-4 py-2 rounded bg-gray-800 font-bold text-xs uppercase hover:bg-gray-700">JP</button>
                  </div>
              </div>
          </div>

          <div class="lg:col-span-1">
              <div class="glass rounded-2xl p-4 h-[600px] flex flex-col">
                  <h3 class="font-bold mb-4 flex items-center gap-2">
                      <i data-lucide="list-video" class="w-5 h-5 text-orange-500"></i> 
                      Episode List
                  </h3>
                  <div id="episode-list" class="flex-grow overflow-y-auto pr-2 custom-scrollbar space-y-2">
                      </div>
              </div>
          </div>
      </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
