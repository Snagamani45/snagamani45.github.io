<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seed of Might Portal | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
          background-image: url('https://wallpapers.com/images/hd/shenronand-goku-sky-adventure-td3wsgcpsm09tgb0.jpg');
          background-size: cover;
          background-attachment: fixed;
          background-position: center;
          color: #e2e8f0;
          min-height: 100vh;
        }
        .glass { 
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        .series-card {
            transition: all 0.3s ease;
            background: rgba(0, 0, 0, 0.6);
        }
        .series-card:hover {
            transform: translateY(-10px);
            border-color: #f97316;
            background: rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Navigation / Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-12 bg-black/40 p-6 rounded-2xl border border-white/10 backdrop-blur-sm">
            <div>
                <h1 class="text-3xl font-black text-orange-500 tracking-tighter uppercase italic">CC Dragon Ball</h1>
                <p class="text-gray-300 text-xs font-bold tracking-widest mt-1">COLOR CORRECTIONS BY SEED OF MIGHT</p>
            </div>
            
            <div class="relative w-full md:w-72">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                <input 
                    type="text" 
                    placeholder="Search series or movies..." 
                    class="w-full bg-green-900/40 border border-green-800/50 rounded-full py-2 pl-10 pr-4 text-sm text-white focus:outline-none focus:border-orange-500 transition placeholder:text-gray-500"
                >
            </div>
        </header>

        <!-- Main Content -->
        <div class="text-center mb-12">
            <h2 class="text-4xl md:text-6xl font-black mb-3 drop-shadow-2xl">CC DRAGON BALL PORT</h2>
            <p class="text-orange-400 font-bold tracking-widest uppercase text-sm">Seed Of Might's Dragon Ball Color Corrections</p>
        </div>

        <main class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!--Dragon Ball-->
            <a href="watch.html?series=db" class="series-card group rounded-2xl overflow-hidden border border-white/10 p-1">
                <div class="aspect-[3/4] rounded-xl overflow-hidden relative">
                    <img src="thumbnails/db_logo.jpg" alt="Dragon Ball" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div>
                    <div class="absolute bottom-6 left-6">
                        <h3 class="text-2xl font-black text-orange-500">DRAGON BALL</h3>
                        <p class="text-sm text-gray-400">153 Episodes</p>
                    </div>
                </div>
            </a>

            <!--Dragon Ball Z-->
            <a href="watch.html?series=dbz" class="series-card group rounded-2xl overflow-hidden border border-white/10 p-1">
                <div class="aspect-[3/4] rounded-xl overflow-hidden relative">
                    <img src="thumbnails/dbz_logo.jpg" alt="Dragon Ball Z" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div>
                    <div class="absolute bottom-6 left-6">
                        <h3 class="text-2xl font-black text-orange-500">DRAGON BALL Z</h3>
                        <p class="text-sm text-gray-400">291 Episodes</p>
                    </div>
                </div>
            </a>
            
            <!--Dragon Ball Z Kai -->
             <a href="watch.html?series=dbzkai" class="series-card group rounded-2xl overflow-hidden border border-white/10 p-1">
                <div class="aspect-[3/4] rounded-xl overflow-hidden relative">
                    <img src="thumbnails/dbzkai_logo.jpg" alt="Dragon Ball Z" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div>
                    <div class="absolute bottom-6 left-6">
                        <h3 class="text-2xl font-black text-orange-500">DRAGON BALL Z KAI</h3>
                        <p class="text-sm text-gray-400">167 Episodes</p>
                    </div>
                </div>
            </a>
            
            
            <!--DBZ Movies and Specials-->
            <a href="watch.html?series=dbzmovies" class="series-card group rounded-2xl overflow-hidden border border-white/10 p-1">
                <div class="aspect-[3/4] rounded-xl overflow-hidden relative">
                    <img src="thumbnails/dbzmovies_logo.jpeg" alt="Movies" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div>
                    <div class="absolute bottom-6 left-6">
                        <h3 class="text-2xl font-black text-orange-500">DBZ MOVIES & SPECIALS</h3>
                        <p class="text-sm text-gray-400">Full Collection</p>
                    </div>
                </div>
            </a>
            
            <!--Dragon Ball GT-->
            <a href="watch.html?series=dbgt" class="series-card group rounded-2xl overflow-hidden border border-white/10 p-1">
                <div class="aspect-[3/4] rounded-xl overflow-hidden relative">
                    <img src="thumbnails/dbgt_logo.jpg" alt="Dragon Ball Z" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div>
                    <div class="absolute bottom-6 left-6">
                        <h3 class="text-2xl font-black text-orange-500">DRAGON BALL GT</h3>
                        <p class="text-sm text-gray-400">64 Episodes</p>
                    </div>
                </div>
            </a>
        </main>

    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
